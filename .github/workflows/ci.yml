name: CI

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        compiler: [g++, clang++]
        build_type: [Debug, Release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        env:
          CXX: ${{ matrix.compiler }}
        run: >-
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_CXX_FLAGS="-Wall -Wextra -Wpedantic -Wconversion -Wsign-conversion"
      - name: Build
        run: cmake --build build --parallel 2
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Install
        run: cmake --install build --prefix "${{ runner.temp }}/qclint-install"

  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: >-
          cmake -S . -B build-asan -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
      - name: Build
        run: cmake --build build-asan --parallel 2
      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1
        # The package-consumer test intentionally links without sanitizer
        # runtimes; installation is already exercised by every matrix build.
        run: ctest --test-dir build-asan --output-on-failure -E qclint_package

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        env:
          CXX: clang++
        run: cmake -S . -B build-fuzz -DQCLINT_BUILD_FUZZER=ON
      - name: Build
        run: cmake --build build-fuzz --target qclint_parser_fuzz --parallel 2
      - name: Run smoke fuzzing
        run: build-fuzz/qclint_parser_fuzz -runs=1000
